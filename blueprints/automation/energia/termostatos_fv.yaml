blueprint:
  name: Control PRO termostatos FV (completo sin errores)
  description: >
    Control avanzado:
    - Si batería >= 100% y solar > 2kW durante 5 min Y es de día → 25°C
    - Si batería < 50% y solar < 2kW durante 5 min → OFF
    - Al ponerse el sol → OFF siempre
  domain: automation

  input:
    battery_entity:
      name: Sensor de batería (%)
      selector:
        entity:
          domain: sensor

    solar_entity:
      name: Sensor de producción solar (W)
      selector:
        entity:
          domain: sensor

    thermostats:
      name: Termostatos
      selector:
        target:
          entity:
            domain: climate

    temperature:
      name: Temperatura objetivo
      default: 25
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
          unit_of_measurement: "°C"

    solar_threshold:
      name: Umbral producción solar (W)
      default: 2000
      selector:
        number:
          min: 0
          max: 10000
          step: 100
          unit_of_measurement: "W"

trigger:
  # 🔥 Activación (condiciones buenas + de día durante 5 min)
  - platform: template
    value_template: >
      {{ states[( !input battery_entity )].state | float >= 99 and
         states[( !input solar_entity )].state | float > ( !input solar_threshold | float ) and
         is_state('sun.sun', 'above_horizon') }}
    for: "00:05:00"
    id: activar

  # ❄️ Desactivación (condiciones malas durante 5 min)
  - platform: template
    value_template: >
      {{ states[( !input battery_entity )].state | float < 50 and
         states[( !input solar_entity )].state | float < ( !input solar_threshold | float ) }}
    for: "00:05:00"
    id: apagar

  # 🌇 Apagado al anochecer
  - platform: state
    entity_id: sun.sun
    to: "below_horizon"
    id: noche

condition: []

action:
  - choose:
      # 🔥 Encender
      - conditions:
          - condition: trigger
            id: activar
        sequence:
          - service: climate.turn_on
            target: !input thermostats
          - service: climate.set_temperature
            target: !input thermostats
            data:
              temperature: !input temperature

      # ❄️ Apagar por condiciones
      - conditions:
          - condition: trigger
            id: apagar
        sequence:
          - service: climate.turn_off
            target: !input thermostats

      # 🌇 Apagar por noche
      - conditions:
          - condition: trigger
            id: noche
        sequence:
          - service: climate.turn_off
            target: !input thermostats

mode: single
